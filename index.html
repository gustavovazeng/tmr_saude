<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TMR Saúde — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--card:#121826;--border:rgba(255,255,255,.07);--border-h:rgba(255,255,255,.12);
  --text:#e8edf6;--text-strong:#f1f5fb;--muted:#8a96ab;--hint:#6b7689;
  --accent:#3b82f6;--accent-bg:rgba(59,130,246,.16);
  --green:#34d399;--amber:#fbbf24;--red:#f87171;
  --surf:rgba(255,255,255,.03);
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

/* ─── App Header ─────────────────────────────────────────────────── */
.app-hdr{position:sticky;top:0;z-index:20;background:rgba(12,17,28,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:0 26px;height:54px;
  display:flex;align-items:center;justify-content:space-between;gap:16px}

/* Funil dropdown */
.funil-wrap{position:relative}
.funil-btn{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:9px;border:1px solid var(--border);background:var(--surf);cursor:pointer;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;transition:border-color .15s}
.funil-btn:hover{border-color:var(--border-h)}
.funil-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.funil-name{font-size:12px;font-weight:600;color:var(--text-strong)}
.funil-status{font-size:9px;color:var(--green);letter-spacing:.04em}
.funil-chevron{color:var(--muted);font-size:10px;margin-left:2px}
.funil-menu{position:absolute;top:calc(100% + 6px);left:0;background:#1a2236;border:1px solid var(--border-h);border-radius:10px;padding:4px;min-width:180px;box-shadow:0 6px 30px rgba(2,6,20,.45);z-index:100}
.funil-opt{padding:8px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:all .12s;display:flex;align-items:center;gap:8px}
.funil-opt:hover{background:var(--accent-bg);color:var(--text)}
.funil-opt.fopt-active{background:var(--accent-bg);color:#cfe0ff}
.fopt-dot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
.funil-opt.fopt-active .fopt-dot{background:var(--green)}

/* Nav tabs */
.hdr-tabs{display:flex;align-items:center;gap:4px}
.htab{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.htab:hover{color:var(--text)}
.htab.htab-active{background:rgba(59,130,246,.16);color:#fff}
.htab-icon{font-size:13px}

/* Period controls */
.hdr-right{display:flex;align-items:center;gap:8px}
.presets{display:flex;gap:4px}
.btn-pre{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 11px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap}
.btn-pre:hover{border-color:var(--border-h);color:var(--text)}
.btn-pre.on{background:rgba(59,130,246,.16);border-color:rgba(96,165,250,.35);color:#cfe0ff;font-weight:600}
.drbox{display:flex;align-items:center;background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color .15s;padding:0 6px;gap:3px}
.drbox:focus-within{border-color:rgba(96,165,250,.5)}
.drbox-icon{color:var(--hint);font-size:12px;user-select:none}
.drbox input[type=date]{background:transparent;border:none;outline:none;color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;padding:5px 4px;cursor:pointer;color-scheme:dark;width:100px}
.drbox-sep{color:var(--hint);font-size:11px;user-select:none}
.btn-update{background:rgba(59,130,246,.16);border:1px solid rgba(96,165,250,.3);color:#60a5fa;padding:5px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;white-space:nowrap;box-shadow:0 0 16px rgba(59,130,246,.2)}
.btn-update:hover:not(:disabled){box-shadow:0 0 16px rgba(59,130,246,.4)}
.btn-update:disabled{opacity:.4;cursor:not-allowed}

/* ─── Content ────────────────────────────────────────────────────── */
.app-content{max-width:1640px;margin:0 auto;padding:22px 30px 40px}
.page{display:none}.page.active{display:block}

/* Page header */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.hdr-title{font-size:22px;font-weight:700;font-family:'Sora',sans-serif;color:var(--text-strong);line-height:1.25}
.hdr-sub{margin-top:5px;font-size:11px;color:var(--hint);font-family:'JetBrains Mono',monospace}
.err{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.25);border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--red);line-height:1.5}

/* KPIs */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:13px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s}
.kc:hover{border-color:var(--border-h)}
.kc-lbl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;font-weight:700}
.kc-val{font-family:'JetBrains Mono',monospace;font-weight:600;letter-spacing:-.02em;font-size:22px;line-height:1.1;color:var(--text-strong)}
.kc-val-sm{font-size:18px}
.kc-sub{font-size:10px;color:var(--hint);margin-top:5px;font-family:'JetBrains Mono',monospace}
.kc-date{font-size:9px;color:var(--hint);margin-bottom:4px;font-family:'JetBrains Mono',monospace;font-weight:500}

/* Section label */
.section-lbl{font-size:9px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.09em;margin-bottom:10px;margin-top:20px}

/* Status legend */
.status-legend{display:flex;gap:16px;margin-bottom:14px}
.sl{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--hint)}
.sl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Charts */
.cc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 20px 14px}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ct{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.lg{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.ll{width:14px;height:2px;border-radius:2px}
.ld{width:7px;height:7px;border-radius:50%}
.charts-2x2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}
.charts-2x3{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px}

/* Toggle overlay buttons */
.overlay-btns{display:flex;gap:6px}
.btn-overlay{font-size:10px;padding:3px 10px;border-radius:5px;border:1px solid var(--border-h);color:var(--muted);background:transparent;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.btn-overlay:hover{border-color:var(--accent);color:var(--text)}
.btn-overlay.on{background:var(--accent-bg);border-color:rgba(96,165,250,.4);color:#60a5fa;font-weight:600}

/* Tooltip */
.tip{background:#1a2236;border:1px solid var(--border-h);border-radius:8px;padding:10px 13px;font-size:12px;box-shadow:0 4px 16px rgba(2,6,20,.45);display:none;position:absolute;pointer-events:none;z-index:20;min-width:150px}
.tl{color:var(--hint);margin-bottom:5px;font-weight:500;font-size:10px;font-family:'JetBrains Mono',monospace}
.tr{display:flex;justify-content:space-between;gap:14px;margin-bottom:2px;font-size:11px}
.tv{color:var(--text-strong);font-weight:600;font-family:'JetBrains Mono',monospace}

/* Spinner */
.sw{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px}
.sp{width:32px;height:32px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.st{color:var(--hint);font-size:13px}
.foot{margin-top:18px;font-size:10px;color:var(--hint);text-align:center;font-family:'JetBrains Mono',monospace;opacity:.5}
canvas{display:block}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer;filter:invert(1)}

/* Quick period inside pages (funil / análise) */
.period-wrap{margin-bottom:18px}
.period-top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.period-lbl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;font-weight:700}
.drbox-sm{display:flex;align-items:center;background:var(--surf);border:1px solid var(--border);border-radius:7px;overflow:hidden;gap:2px;padding:0 5px}
.drbox-sm input[type=date]{background:transparent;border:none;outline:none;color:var(--text);font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 4px;cursor:pointer;color-scheme:dark;width:96px}
.period-quick{display:flex;gap:5px;flex-wrap:wrap}
.btn-q{background:transparent;border:1px solid var(--border);color:var(--hint);padding:4px 11px;border-radius:6px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.btn-q:hover{border-color:var(--border-h);color:var(--text)}
.btn-q.on{background:var(--accent-bg);border-color:rgba(96,165,250,.35);color:#cfe0ff;font-weight:600}

/* Análise sub-tabs */
.ana-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;gap:0}
.ana-tab{padding:7px 14px;font-size:11px;font-weight:500;color:var(--hint);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.ana-tab:hover{color:var(--text)}
.ana-tab.active{color:#60a5fa;border-bottom-color:#3b82f6}

/* ─── Mobile Responsive ────────────────────────────────────────── */
@media(max-width:768px){
  /* ── Header ── */
  .app-hdr{
    height:auto;flex-wrap:wrap;
    padding:0;gap:0;align-items:stretch;
  }
  .funil-wrap{
    padding:9px 14px;flex-shrink:0;
    border-bottom:1px solid var(--border);
    width:auto;
  }
  .hdr-right{
    order:2;flex:1;min-width:0;
    display:flex;align-items:center;gap:6px;
    overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
    padding:8px 14px 8px 8px;flex-wrap:nowrap;
    border-bottom:1px solid var(--border);
  }
  .hdr-right::-webkit-scrollbar{display:none}
  .presets{flex-wrap:nowrap;gap:3px}
  .btn-pre{font-size:10px;padding:4px 8px;flex-shrink:0}
  .drbox{flex-shrink:0}
  .drbox input[type=date]{width:86px;font-size:10px}
  .btn-update{font-size:11px;padding:5px 10px;flex-shrink:0}
  .hdr-tabs{
    order:3;width:100%;
    overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
    flex-wrap:nowrap;gap:2px;
    padding:6px 14px 8px;
  }
  .hdr-tabs::-webkit-scrollbar{display:none}
  .htab{flex-shrink:0;font-size:11px;padding:5px 10px}
  .htab-icon{font-size:12px}

  /* ── Content ── */
  .app-content{padding:14px 10px 30px;max-width:100%}
  .hdr{flex-direction:column;gap:6px;margin-bottom:14px}
  .hdr-title{font-size:18px}

  /* ── KPI Grids ── */
  .g3,.g4,.g5{
    grid-template-columns:repeat(2,1fr)!important;
    gap:8px!important;
  }
  .kc{padding:12px 13px}
  .kc-val{font-size:18px}
  .kc-val-sm{font-size:15px}

  /* ── Inline repeat grids (render functions) ── */
  [style*="repeat(3,1fr)"],[style*="repeat(4,1fr)"],
  [style*="repeat(5,1fr)"],[style*="repeat(6,1fr)"],
  [style*="repeat(7,1fr)"],[style*="repeat(8,1fr)"]{
    grid-template-columns:repeat(2,1fr)!important;
    gap:8px!important;
  }
  /* 2-column side-by-side layouts → single column */
  [style*="1fr 1fr"]{grid-template-columns:1fr!important}
  /* Funil SVG + cards sidebar → stack */
  [style*="1fr 260px"]{grid-template-columns:1fr!important}
  /* Resumo diário 2-col → stack */
  [style*="220px 1fr"]{grid-template-columns:1fr!important}

  /* ── Charts ── */
  .charts-2x2,.charts-2x3{
    grid-template-columns:1fr!important;
    gap:10px!important;
  }

  /* ── Tables: allow horizontal scroll ── */
  .page div[style*="overflow:hidden"]{
    overflow-x:auto!important;
    -webkit-overflow-scrolling:touch;
  }
  .page table{font-size:10px!important}
  .page td,.page th{
    padding:7px 8px!important;
    white-space:nowrap;
  }
  /* First column (names/labels) can wrap */
  .page td:first-child,.page th:first-child{
    white-space:normal;
    min-width:90px;max-width:140px;
  }

  /* ── Status legend ── */
  .status-legend{flex-wrap:wrap;gap:8px}

  /* ── Period quick buttons ── */
  .period-quick{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .period-quick::-webkit-scrollbar{display:none}
  .btn-q{flex-shrink:0;font-size:10px;padding:3px 9px}

  /* ── Ana sub-tabs ── */
  .ana-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap}
  .ana-tabs::-webkit-scrollbar{display:none}
  .ana-tab{flex-shrink:0;font-size:10px;padding:6px 10px}

  /* ── Section label spacing ── */
  .section-lbl{margin-top:16px}
}
</style>
</head>
<body>
<!-- ─── App Header ───────────────────────────────────────────────── -->
<header class="app-hdr">
  <div class="funil-wrap" id="funil-wrap">
    <button class="funil-btn" onclick="toggleFunilMenu(event)">
      <span class="funil-dot" id="funil-dot"></span>
      <div>
        <div class="funil-name" id="funil-name">TMR Saúde - Perpétuo</div>
        <div class="funil-status" id="funil-status">ativo</div>
      </div>
      <span class="funil-chevron">▾</span>
    </button>
    <div class="funil-menu" id="funil-menu" style="display:none">
      <div class="funil-opt" id="fopt-perpetuo" onclick="setFunil('perpetuo')">
        <span class="fopt-dot"></span> TMR Saúde - Perpétuo
      </div>
      <div class="funil-opt" id="fopt-seguidores" onclick="setFunil('seguidores')">
        <span class="fopt-dot"></span> TMR Saúde - Seguidores
      </div>
    </div>
  </div>
  <nav class="hdr-tabs" id="hdr-tabs">
    <button class="htab htab-active" onclick="navTo('principal')">⊞ Principal</button>
    <button class="htab" onclick="navTo('funil')">▽ Métricas do funil</button>
    <button class="htab" onclick="navTo('trafego')">⟳ Métricas tráfego</button>
    <button class="htab" onclick="navTo('anuncios')">◈ Campanhas / Anúncios</button>
    <button class="htab" onclick="navTo('resumo')">📋 Resumo diário</button>
  </nav>
  <div class="hdr-right">
    <div class="presets" id="hdr-presets">
      <button class="btn-pre" onclick="applyQuickCurrent('hoje')">Hoje</button>
      <button class="btn-pre" onclick="applyQuickCurrent('ontem')">Ontem</button>
      <button class="btn-pre" onclick="applyQuickCurrent('7d')">7 dias</button>
      <button class="btn-pre on" onclick="applyQuickCurrent('30d')">30 dias</button>
      <button class="btn-pre" onclick="applyQuickCurrent('mes')">Este mês</button>
    </div>
    <div class="drbox">
      <span class="drbox-icon">📅</span>
      <input type="date" id="hdr-start" onchange="onDCCurrent('s',this.value)"/>
      <span class="drbox-sep">→</span>
      <input type="date" id="hdr-end" onchange="onDCCurrent('e',this.value)"/>
    </div>
    <button class="btn-update" id="btn-update" onclick="loadData(true)">↻ Atualizar</button>
  </div>
</header>

<div class="app-content">
  <div class="sw" id="loading"><div class="sp"></div><p class="st">Carregando dados...</p></div>
  <div id="err-panel" style="display:none;align-items:flex-start;justify-content:center;padding:40px 24px"></div>
  <div id="page-principal" class="page active"></div>
  <div id="page-funil"     class="page"></div>
  <div id="page-trafego"   class="page"></div>
  <div id="page-anuncios"  class="page"></div>
  <div id="page-resumo"    class="page"></div>
</div>

<script>
const _DATA_META=null;
const _DATA_LEADS=null;


// ── Metas TMR ─────────────────────────────────────────────────────────────
const META_CPL = 15;   // R$ 15 custo por lead (tráfego)

const METAS_T = {
  cpl:      {val:15,   higher:false},
  cpc:      {val:5.30, higher:false},
  ctr:      {val:1.5,  higher:true},
  cpm:      {val:80,   higher:false},
  connect:  {val:80,   higher:true},
  txConvPg: {val:30,   higher:true},
};

// Chart colors
const CHART_COLOR = "#3b82f6";
const CHART_INV   = "#3b82f6";
const CHART_CPL   = "#fbbf24";
const CHART_LEADS = "#34d399";
const CHART_ORG   = "#a78bfa";

// ── State ─────────────────────────────────────────────────────────────────
const S = {
  currentFunil:"perpetuo",   // "perpetuo" | "seguidores"
  // ── Perpétuo data ───────────────────────────────────────────────
  meta:{},        // date → {spend,clicks,impressions,metaLeads,landingViews}
  leadsD:{},      // date → {traffic,organic}
  metaByAd:{}, metaByAdByDate:{},
  metaByCamp:{}, metaByCampByDate:{},
  leadsFat:{},    // faturamento → count (traffic leads all-time)
  leadsEsp:{},    // especialidade → count
  // ── Seguidores data ─────────────────────────────────────────────
  distMeta:{},    // date → {spend,clicks,impressions,profileVisits,video3s,video15s}
  distMetaByAd:{}, distMetaByAdByDate:{},
  distMetaByCamp:{}, distMetaByCampByDate:{},
  distSeg:{},     // date → {seguidores,profileVisits}
  distSegByAd:{}, distSegByCamp:{},
  manualPlanDist:null,       // planned spend for dist period
  startDate:"", endDate:"", activeQuick:"30d",
  aSort:{col:"spend",dir:"desc"},
  cSort:{col:"spend",dir:"desc"},
  campSearch:"", adSearch:"",
  manualSpendHoje:null,
  selectedCamps:new Set(),
  selectedAds:new Set(),
  overlays:{cpl:{inv:false},ctr:{inv:false},cpm:{inv:false},cpc:{inv:false},txConvPg:{inv:false},connect:{inv:false}},
  currentPage:"principal",
  updated:null,
  loading:true, error:null, firstLoad:true,
};

// ── Date helpers (GMT-3 Brasil) ───────────────────────────────────────────
function nowBR(){ return new Date(Date.now()-(3*60*60*1000)); }
function toISODate(d){ return d.toISOString().split("T")[0]; }
function todayISO(){ return toISODate(nowBR()); }
function yesterdayISO(){ const d=nowBR();d.setDate(d.getDate()-1);return toISODate(d); }
function nDaysAgoISO(n){ const d=nowBR();d.setDate(d.getDate()-n);return toISODate(d); }
function firstOfMonthISO(){ const d=nowBR();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`; }
function addDays(iso,n){ const d=new Date(iso+"T12:00:00Z");d.setDate(d.getDate()+n);return toISODate(d); }
function subDays(iso,n){ return addDays(iso,-n); }

// ── Format helpers ────────────────────────────────────────────────────────
function parseBRL(s){
  if(!s||s==="-"||s==="0")return 0;
  s=String(s).replace(/[R$\s]/g,"").trim();
  if(!s||s==="-")return 0;
  // Both . and , → Brazilian thousands: 1.234,56
  if(s.includes(",")&&s.includes("."))return parseFloat(s.replace(/\./g,"").replace(",","."))||0;
  // Only , → Brazilian decimal: 2,68
  if(s.includes(","))return parseFloat(s.replace(",","."))||0;
  // Only . → US decimal: 2.68
  return parseFloat(s)||0;
}
function fBRL(n){ return "R$ "+(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fBRLShort(n){ const a=Math.abs(n||0),sg=n<0?"-":"";if(a>=1000)return sg+"R$ "+(a/1000).toFixed(1).replace(".",",")+"k";return sg+"R$ "+Math.round(a); }
function fPct(n){ return (n||0).toFixed(1)+"%"; }
function fDate(iso){ if(!iso)return"";const[,m,d]=iso.split("-");return `${d}/${m}`; }
function fDateBR(iso){ if(!iso)return"";const[y,m,d]=iso.split("-");return `${d}/${m}/${y}`; }
function toISO(s){
  if(!s||s==="Date"||s==="")return null;
  s=String(s).trim().split(" ")[0];
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  const p=s.split("/");
  if(p.length===3){
    const y=p[2].length===4?p[2]:"20"+p[2];
    const a=parseInt(p[0]),b=parseInt(p[1]);
    // If first part > 12 → must be DD/MM/YYYY (BR)
    // If second part > 12 → must be MM/DD/YYYY (US)
    // Ambiguous → assume BR (DD/MM)
    if(b>12){
      // MM/DD/YYYY (US format from Google Sheets export)
      return `${y}-${p[0].padStart(2,"0")}-${p[1].padStart(2,"0")}`;
    }
    return `${y}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
  }
  return null;
}
function stripTime(s){ if(!s)return s;return String(s).trim().split(" ")[0]; }

// ── Status helpers ────────────────────────────────────────────────────────
function statusColor(val,meta,higherIsBetter){
  if(!val||val===0)return "#8a96ab";
  const ratio=val/meta;
  if(higherIsBetter){ if(ratio>=1)return "#34d399";if(ratio>=0.9)return "#fbbf24";return "#f87171"; }
  else { if(ratio<=1)return "#34d399";if(ratio<=1.1)return "#fbbf24";return "#f87171"; }
}
function statusBorder(val,meta,higherIsBetter){
  const c=statusColor(val,meta,higherIsBetter);
  if(c==="#34d399") return "rgba(52,211,153,.22)";
  if(c==="#fbbf24") return "rgba(251,191,36,.22)";
  if(c==="#f87171") return "rgba(248,113,113,.22)";
  return "var(--border)";
}

// ── Ad code extractor ─────────────────────────────────────────────────────
function extractAdvCode(name){
  if(!name) return null;
  const clean=name.replace(/^teste-/i,"");
  const m=clean.match(/ad[vic]\d+/i);
  return m ? m[0].toLowerCase() : null;
}

// ── Lead CSV field parser (handles swapped columns) ───────────────────────
const FAT_VALS = new Set(["ate-75k","76k-a-150k","151k-a-300k","301k-a-500k","501k-1m","acima-1mm"]);
const ESP_VALS = new Set(["odontologia","estecica-e-beleza","medicina","veterinária","saúde mental e terapêutica","outros","fisioterapia","estética e beleza"]);

function parseLeadFields(row){
  const col1=(row["Qual seu faturamento mensal?"]||"").trim();
  const col2=(row["Especialidade ou tipo de procedimento"]||"").trim();
  const c1l=col1.toLowerCase(), c2l=col2.toLowerCase();
  const c1F=FAT_VALS.has(col1), c2F=FAT_VALS.has(col2);
  const c1E=ESP_VALS.has(c1l), c2E=ESP_VALS.has(c2l);
  if(c1F&&c2E) return{faturamento:col1,especialidade:col2};
  if(c1E&&c2F) return{faturamento:col2,especialidade:col1};
  if(c1F) return{faturamento:col1,especialidade:col2};
  if(c2F) return{faturamento:col2,especialidade:col1};
  if(c1E) return{faturamento:col2,especialidade:col1};
  if(c2E) return{faturamento:col1,especialidade:col2};
  return{faturamento:col1,especialidade:col2};
}

function isTrafficLead(row){
  const src=(row["utm_source"]||"").trim();
  return src===""||src.toUpperCase().includes("FB")||src.toLowerCase().includes("fb");
}
function isOrganicLead(row){
  const src=(row["utm_source"]||"").trim();
  return src==="instagram_bio";
}

// ── CSV parser ────────────────────────────────────────────────────────────
function parseCSVText(text){
  const lines=text.split(/\r?\n/);
  const result=[];
  for(const line of lines){
    if(!line.trim()) continue;
    const row=[];let cur="";let inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){row.push(cur);cur="";}
      else cur+=c;
    }
    row.push(cur);
    result.push(row);
  }
  return {values:result};
}
function parseSheet(json){
  const rows=json.values||[];if(rows.length<2)return[];
  const h=rows[0];
  return rows.slice(1).map(r=>Object.fromEntries(h.map((k,i)=>[k,(r[i]||"").trim()])));
}

async function fetchCSV(filename){
  const res=await fetch("./"+encodeURIComponent(filename));
  if(!res.ok) throw new Error(`HTTP ${res.status} ao carregar "${filename}"`);
  return parseCSVText(await res.text());
}

// ── Canvas / Chart helpers ────────────────────────────────────────────────
const DPR=window.devicePixelRatio||1;
const GRID_C="rgba(255,255,255,0.06)";
const TICK_C="#6b7689";

function initCanvas(id,cssW,cssH){
  const c=document.getElementById(id);if(!c)return null;
  c.width=Math.round(cssW*DPR);c.height=Math.round(cssH*DPR);
  c.style.width=cssW+"px";c.style.height=cssH+"px";
  const ctx=c.getContext("2d");ctx.scale(DPR,DPR);
  return ctx;
}
function drawLineArea(ctx,xP,yP,vals,color,fill=true){
  if(vals.length<2)return;
  if(fill){
    const n=vals.length;
    ctx.beginPath();ctx.moveTo(xP(0),yP(vals[0]));
    for(let i=1;i<n;i++)ctx.lineTo(xP(i),yP(vals[i]));
    ctx.lineTo(xP(n-1),yP(0));ctx.lineTo(xP(0),yP(0));ctx.closePath();
    const g=ctx.createLinearGradient(0,0,0,ctx.canvas.height/DPR);
    g.addColorStop(0,color+"28");g.addColorStop(1,color+"00");
    ctx.fillStyle=g;ctx.fill();
  }
  ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.moveTo(xP(0),yP(vals[0]));
  for(let i=1;i<vals.length;i++)ctx.lineTo(xP(i),yP(vals[i]));
  ctx.stroke();
}
function drawBars(ctx,xP,yP,yZero,vals,color,barW){
  vals.forEach((v,i)=>{
    const x=xP(i)-barW/2, y=Math.min(yP(v),yZero), h=Math.abs(yP(v)-yZero);
    ctx.fillStyle=color+"cc";
    ctx.fillRect(x,y,barW,Math.max(h,1));
  });
}

// Dual-axis: Investimento (left) × CPL (right)
function drawDualTMR(id,data,cssW,cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:14,r:58,b:28,l:64};
  const cW=cssW-P.l-P.r,cH=cssH-P.t-P.b;
  const lVals=data.map(d=>d.spend||0);
  const rVals=data.map(d=>d.cpl||0);
  const lMax=Math.max(...lVals,0.01)*1.15;
  const rMax=Math.max(...rVals,META_CPL,0.01)*1.4;
  const xP=i=>P.l+(data.length>1?i/(data.length-1):0.5)*cW;
  const yPL=v=>P.t+cH-((v)/(lMax))*cH;
  const yPR=v=>P.t+cH-((v)/(rMax))*cH;
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    ctx.fillStyle=TICK_C;ctx.font="10px 'DM Mono',monospace";
    ctx.textAlign="right";ctx.fillText(fBRLShort(lMax-(i/4)*lMax),P.l-5,y+3.5);
    ctx.textAlign="left";ctx.fillText("R$"+(rMax-(i/4)*rMax).toFixed(0),P.l+cW+5,y+3.5);
  }
  const mY=yPR(META_CPL);
  ctx.strokeStyle=CHART_CPL+"55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(P.l,mY);ctx.lineTo(P.l+cW,mY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle=CHART_CPL;ctx.font="9px 'Inter',sans-serif";ctx.textAlign="left";
  ctx.fillText("Meta R$"+META_CPL,P.l+cW+4,mY-3);
  drawLineArea(ctx,xP,yPL,lVals,CHART_INV,true);
  drawLineArea(ctx,xP,yPR,rVals,CHART_CPL,false);
  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="10px 'DM Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}

  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="right";
    ctx.fillText(Math.round(maxV-(i/4)*maxV),P.l-4,y+3);
  }
  drawBars(ctx,xP,yP,P.t+cH,vals,CHART_COLOR,barW);
  const step=n>60?7:n>30?3:n>14?2:1;
  ctx.textAlign="center";
  vals.forEach((v,i)=>{
    if(v>0&&(n<=30||i%step===0)){
      ctx.fillStyle="#e8edf6";ctx.font=`bold ${Math.min(10,Math.max(7,barW))}px 'DM Mono',monospace`;
      ctx.fillText(v,xP(i),yP(v)-4);
    }
  });
  ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}

function drawChartWithOverlay(id,data,key,fmtY,refVal,refLabel,overlayInv,cssW,cssH){
  const ctx=initCanvas(id,cssW,cssH);if(!ctx)return;
  const P={t:12,r:overlayInv?52:12,b:26,l:52};
  const cW=cssW-P.l-P.r,cH=cssH-P.t-P.b;
  const vals=data.map(d=>+(d[key])||0);
  const invVals=data.map(d=>d.spend||0);
  let allL=[...vals];if(refVal!=null)allL.push(refVal);
  const lMax=Math.max(...allL,0.01)*1.2;
  const rMax=overlayInv?Math.max(...invVals,0.01)*1.2:1;
  const xP=i=>P.l+(data.length>1?i/(data.length-1):0.5)*cW;
  const yPL=v=>P.t+cH-(v/lMax)*cH;
  const yPR=v=>P.t+cH-(v/rMax)*cH;
  ctx.setLineDash([]);
  for(let i=0;i<=4;i++){
    const y=P.t+(i/4)*cH;
    ctx.strokeStyle=GRID_C;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+cW,y);ctx.stroke();
    ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="right";
    ctx.fillText(fmtY(lMax-(i/4)*lMax),P.l-4,y+3);
  }
  if(overlayInv){
    for(let i=0;i<=4;i++){
      const y=P.t+(i/4)*cH;
      ctx.fillStyle=CHART_CPL;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="left";
      ctx.fillText(fBRLShort(rMax-(i/4)*rMax),P.l+cW+4,y+3);
    }
  }
  if(refVal!=null){
    const ry=yPL(refVal);
    ctx.strokeStyle=CHART_COLOR+"55";ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(P.l,ry);ctx.lineTo(P.l+cW,ry);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=CHART_COLOR;ctx.font="8px 'Inter',sans-serif";ctx.textAlign="right";
    ctx.fillText(refLabel||"Meta",P.l+cW,ry-3);
  }
  drawLineArea(ctx,xP,yPL,vals,CHART_COLOR,true);
  if(overlayInv)drawLineArea(ctx,xP,yPR,invVals,CHART_CPL,false);
  const step=data.length>60?7:data.length>30?3:data.length>14?2:1;
  ctx.fillStyle=TICK_C;ctx.font="9px 'DM Mono',monospace";ctx.textAlign="center";ctx.setLineDash([]);
  data.forEach((d,i)=>{if(i%step===0)ctx.fillText(d.label,xP(i),P.t+cH+18);});
}

function setupTip(cid,tid,data,lines,padL=58,padR=12){
  const c=document.getElementById(cid),t=document.getElementById(tid);
  if(!c||!t)return;
  c.addEventListener("mousemove",e=>{
    const rect=c.getBoundingClientRect();
    const relX=(e.clientX-rect.left)-padL;
    const cW=rect.width-padL-padR;
    if(relX<0||relX>cW||!data.length){t.style.display="none";return;}
    const d=data[Math.max(0,Math.min(Math.round((relX/cW)*(data.length-1)),data.length-1))];
    let h=`<div class="tl">${d.label||d.date}</div>`;
    lines.forEach(l=>{
      h+=`<div class="tr"><span style="color:${l.color}">${l.name}</span><span class="tv">${(l.fmt||fBRL)(+(d[l.key])||0)}</span></div>`;
    });
    t.innerHTML=h;t.style.display="block";
    const tw=t.offsetWidth,x=e.clientX-rect.left;
    t.style.left=(x+12+tw>rect.width-8?x-tw-12:x+12)+"px";
    t.style.top=(e.clientY-rect.top-20)+"px";
  });
  c.addEventListener("mouseleave",()=>t.style.display="none");
}

// ── Render Funil ──────────────────────────────────────────────────────────
function renderFunil(){
  const el=document.getElementById("page-funil");if(!el)return;

  const allDates=Object.keys(S.meta).sort().filter(d=>(!S.startDate||d>=S.startDate)&&(!S.endDate||d<=S.endDate));
  let totalSpend=0;
  for(const d of allDates){ totalSpend+=(S.meta[d]?.spend||0); }
  let trafficLeads=0,organicLeads=0;
  const allLeadDates=Object.keys(S.leadsD).sort().filter(d=>(!S.startDate||d>=S.startDate)&&(!S.endDate||d<=S.endDate));
  for(const d of allLeadDates){
    trafficLeads+=(S.leadsD[d]?.traffic||0);
    organicLeads+=(S.leadsD[d]?.organic||0);
  }

  // Fat & Esp use FULL period (all-time view of leads)
  const FAT_ORDER=["ate-75k","76k-a-150k","151k-a-300k","301k-a-500k","501k-1m","acima-1mm"];
  const FAT_LABEL={"ate-75k":"Até R$ 75k","76k-a-150k":"R$ 76k – 150k","151k-a-300k":"R$ 151k – 300k","301k-a-500k":"R$ 301k – 500k","501k-1m":"R$ 501k – 1M","acima-1mm":"Acima de R$ 1M"};

  const fatTotal=Object.values(S.leadsFat).reduce((a,b)=>a+b,0)||1;
  const espTotal=Object.values(S.leadsEsp).reduce((a,b)=>a+b,0)||1;

  function breakdown(data,labelMap,order){
    const sorted=order?order.filter(k=>data[k]>0):[...Object.keys(data)].sort((a,b)=>(data[b]||0)-(data[a]||0));
    const total=Object.values(data).reduce((a,b)=>a+b,0)||1;

          <div style="height:4px;width:${w}%;background:var(--accent);border-radius:2px"></div>
        </div>
      </div>`;
    }).join("")||`<p style="color:var(--muted);font-size:12px;padding:12px 0">Sem dados</p>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:6px">
      <div>
        <div class="hdr-title">Métricas do Funil</div>

      </div>
    </div>

// ── Render Anúncios ─────────────────────────────────────────────────────────
function renderAnuncios(){
  const el=document.getElementById("page-anuncios");if(!el)return;
  const start=S.startDate,end=S.endDate;

  function sumLeads(map,key){ let t=0;for(const[d,n]of Object.entries(map[key]||{})){if(d>=start&&d<=end)t+=n;}return t; }
  function fDM(iso){if(!iso)return"—";const[,m,d]=iso.split("-");return`${d}/${m}`;}
  const dateLabel=start===end?fDM(start):`${fDM(start)} a ${fDM(end)}`;

  // Campaign rows
  const campRows=[];
  for(const [campName,byDate] of Object.entries(S.metaByCampByDate)){
    let cSpend=0,cClicks=0,cImpr=0;
    for(const[d,vals] of Object.entries(byDate)){if(d>=start&&d<=end){cSpend+=vals.spend;cClicks+=vals.clicks;cImpr+=vals.impressions;}}
    if(cSpend===0)continue;
    const cLeads=sumLeads(S.leadsByCamp,campName);
    campRows.push({campName,spend:cSpend,clicks:cClicks,impressions:cImpr,leads:cLeads,
      cpc:cClicks>0?cSpend/cClicks:0, ctr:cImpr>0?(cClicks/cImpr)*100:0,
      cpm:cImpr>0?(cSpend/cImpr)*1000:0, cpl:cLeads>0?cSpend/cLeads:0});
  }
  const {col:cCol,dir:cDir}=S.cSort;
  const sortedCamps=[...campRows].sort((a,b)=>{
    const av=a[cCol]??"",bv=b[cCol]??"";
    if(typeof av==="string")return cDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    return cDir==="asc"?av-bv:bv-av;
  });

  // Search filter on camps
  const _cq=S.campSearch.trim().toLowerCase();
  const filteredCamps=_cq?sortedCamps.filter(c=>c.campName.toLowerCase().includes(_cq)):sortedCamps;

  // Ad rows — filter by selected campaign if any
  const hasCampSel=S.selectedCamps.size>0;
  const adRows=[];
  for(const[advCode,meta] of Object.entries(S.metaByAd)){
    if(hasCampSel){
      const adCamps=meta.camps||new Set();
      if(![...S.selectedCamps].some(c=>adCamps.has(c)))continue;
    }
    const byDate=S.metaByAdByDate[advCode]||{};
    let spend=0,clicks=0,impressions=0,igUrl="";
    for(const[d,vals] of Object.entries(byDate)){if(d>=start&&d<=end){spend+=vals.spend;clicks+=vals.clicks;impressions+=vals.impressions;if(!igUrl&&vals.igUrl)igUrl=vals.igUrl;}}
    if(spend===0)continue;
    if(!igUrl)igUrl=meta.igUrl||"";
    const leads=sumLeads(S.leadsByAd,advCode);
    adRows.push({advCode,adName:meta.adName||advCode,spend,clicks,impressions,leads,igUrl,
      cpc:clicks>0?spend/clicks:0, ctr:impressions>0?(clicks/impressions)*100:0,
      cpm:impressions>0?(spend/impressions)*1000:0, cpl:leads>0?spend/leads:0});
  }

  const tot=campRows.reduce((a,c)=>({spend:a.spend+c.spend,clicks:a.clicks+c.clicks,impressions:a.impressions+c.impressions,leads:a.leads+c.leads}),{spend:0,clicks:0,impressions:0,leads:0});
  const totCpl=tot.leads>0?tot.spend/tot.leads:0;
  const totCtr=tot.impressions>0?(tot.clicks/tot.impressions)*100:0;

  // Search filter on ads
  const _aq=S.adSearch.trim().toLowerCase();
  const filteredAds=_aq?adRows.filter(a=>(a.adName||a.advCode).toLowerCase().includes(_aq)):adRows;

  const {col,dir}=S.aSort;
  const sorted=[...filteredAds].sort((a,b)=>{
    const av=a[col]??0,bv=b[col]??0;
    if(typeof av==="string")return dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);

  const selAds=sorted.filter(a=>S.selectedAds.has(a.advCode));

      lines.push(`CPM:\t${fBRL(a.cpm)}`);

      ${S.selectedAds.size>0?`<button onclick="clearAds()" style="font-size:10px;padding:3px 9px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:#f87171;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif">✕ Limpar seleção (${S.selectedAds.size})</button>`:""}

    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--card)">
          <th style="${THCK}"></th>
          <th onclick="sortAnuncios('adName')" style="${THL};cursor:pointer;user-select:none">Anúncio ${col==="adName"?(dir==="asc"?"↑":"↓"):"↕"}</th>
          ${thC("spend","Investimento",false)}
          ${thC("leads","Leads",false)}
          ${thC("cpl","Custo por Lead",false)}

// ── Render Resumo ─────────────────────────────────────────────────────────
function renderResumo(){
  const el=document.getElementById("page-resumo");if(!el)return;
  const today=todayISO(), yest=yesterdayISO();
  const start=S.startDate||today, end=S.endDate||today;

  function periodMetrics(s,e){
    const daily=getDailyT(s,e);
    const t=getTotalsT(daily);
    // traffic leads from leads CSV for the period
    let tLeads=0,oLeads=0;
    for(const [d,l] of Object.entries(S.leadsD)){
      if(d>=s&&d<=e){tLeads+=l.traffic;oLeads+=l.organic;}
    }
    t.trafficLeads=tLeads;
    t.organicLeads=oLeads;
    t.totalLeads=tLeads+oLeads;
    t.cpl=tLeads>0?t.spend/tLeads:0;
    return t;
  }

  const tot  =periodMetrics(start,end);
  const ontem=periodMetrics(yest,yest);
  const hojeBase=periodMetrics(today,today);
  const hoje={...hojeBase};
  if(S.manualSpendHoje!==null){
    hoje.spend=S.manualSpendHoje;
    hoje.cpl=hoje.trafficLeads>0?hoje.spend/hoje.trafficLeads:0;
  }

  function em(val,meta,higher){
    if(!val||val===0)return "";
    const ratio=higher?val/meta:meta/val;
    if(ratio>=1)return "🟢";if(ratio>=0.85)return "🟡";return "🔴";
  }
  function fDM(iso){if(!iso)return"—";const[,m,d]=iso.split("-");return`${d}/${m}`;}

  const dateLabel=start===end?fDM(start):`${fDM(start)} a ${fDM(end)}`;

  function fBRLR(n){
    // Format as R$ X.XXX,XX (Brazilian style)
    return "R$ "+(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  function blockText(label,m,isTotal){
    const cplE =em(m.cpl,     META_CPL,              false);
    const cnE  =em(m.connect, METAS_T.connect.val,   true);
    const pcE  =em(m.txConvPg,METAS_T.txConvPg.val,  true);
    const cpcE =em(m.cpc,     METAS_T.cpc.val,       false);
    const ctrE =em(m.ctr,     METAS_T.ctr.val,       true);
    const cpmE =em(m.cpm,     METAS_T.cpm.val,       false);
    const inv  =fBRLR(m.spend);
    const lines=[
`*${label}*`,
``,
`Investimento:\t${inv}`,
`Cadastrados tráfego:\t${m.trafficLeads}`,
`Cadastrados orgânico:\t${m.organicLeads}`,
`Cadastrados total:\t${m.totalLeads}`,
`Custo por Cadastro:\t${fBRLR(m.cpl)}\t${cplE} Meta: R$ ${META_CPL}`,
``,
`Connect Rate:\t${(m.connect||0).toFixed(2)}%\t${cnE} Meta: ${METAS_T.connect.val}%`,
`Tx conv pg cadastro:\t${(m.txConvPg||0).toFixed(2)}%\t${pcE} Meta: ${METAS_T.txConvPg.val}%`,
``,
`CPC:\t${fBRLR(m.cpc)}\t${cpcE} Meta: R$ ${METAS_T.cpc.val}`,
`CTR:\t${(m.ctr||0).toFixed(2)}%\t${ctrE} Meta: ${METAS_T.ctr.val}%`,
`CPM:\t${fBRLR(m.cpm)}\t${cpmE} Meta: R$ ${METAS_T.cpm.val}`,
    ];
    return lines.join("\n");
  }

  const resumoText=
`*Resumo TMR - Consolidado*\t\t

_${dateLabel}_\t\t

📶 ${blockText("Total",tot,true)}

⬅️ ${blockText("Ontem",ontem,false)}

⬇️ ${blockText("Hoje",hoje,false)}`;

  // Visual blocks
  function row(lbl,val,metaStr,emoji){
    return `<div style="display:grid;grid-template-columns:220px 1fr auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
      <span style="color:var(--muted);font-size:12px">${lbl}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-strong)">${val||"—"}</span>
      <span style="font-size:13px;min-width:28px;text-align:right">${emoji||""}<span style="font-size:10px;color:var(--hint);margin-left:4px">${metaStr||""}</span></span>
    </div>`;
  }

  function section(label,m,isHoje=false){
    const cplE =em(m.cpl,     META_CPL,              false);
    const cnE  =em(m.connect, METAS_T.connect.val,   true);
    const pcE  =em(m.txConvPg,METAS_T.txConvPg.val,  true);
    const cpcE =em(m.cpc,     METAS_T.cpc.val,       false);
    const ctrE =em(m.ctr,     METAS_T.ctr.val,       true);
    const cpmE =em(m.cpm,     METAS_T.cpm.val,       false);
    const isManual=isHoje&&S.manualSpendHoje!==null;
    const investRow=isHoje?`
      <div style="display:grid;grid-template-columns:220px 1fr auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
        <span style="color:var(--muted);font-size:12px">Investimento</span>
        <input id="manual-spend-input"
          value="${isManual?(m.spend||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):''}"
          placeholder="${fBRLR(hojeBase.spend)}"
          oninput="setManualSpendHoje(this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
          style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${isManual?'#fbbf24':'var(--text-strong)'};background:transparent;border:none;border-bottom:1px solid ${isManual?'rgba(251,191,36,.4)':'rgba(255,255,255,.1)'};outline:none;padding:2px 0;width:100%"/>
        <span style="font-size:13px;min-width:80px;text-align:right">
          ${isManual?`<button onclick="clearManualSpend()" style="font-size:10px;padding:2px 8px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif">↩ Restaurar</button>`:""}
        </span>
      </div>`:row("Investimento",fBRLR(m.spend),"","");
    return `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--text-strong);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">${label}</div>
      ${investRow}
      ${row("Cadastrados tráfego",m.trafficLeads,"","")}
      ${row("Cadastrados orgânico",m.organicLeads,"","")}
      ${row("Cadastrados total",m.totalLeads,"","")}
      ${row("Custo por Cadastro",fBRLR(m.cpl),`meta R$ ${META_CPL}`,cplE)}
      <div style="height:10px"></div>
      ${row("Connect Rate",(m.connect||0).toFixed(2)+"%",`meta ${METAS_T.connect.val}%`,cnE)}
      ${row("Tx conv pg cadastro",(m.txConvPg||0).toFixed(2)+"%",`meta ${METAS_T.txConvPg.val}%`,pcE)}
      <div style="height:10px"></div>
      ${row("CPC",fBRLR(m.cpc),`meta R$ ${METAS_T.cpc.val}`,cpcE)}
      ${row("CTR",(m.ctr||0).toFixed(2)+"%",`meta ${METAS_T.ctr.val}%`,ctrE)}
      ${row("CPM",fBRLR(m.cpm),`meta R$ ${METAS_T.cpm.val}`,cpmE)}
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:16px">
      <div>
        <div class="hdr-title">Resumo diário</div>
        <div class="hdr-sub">período: ${dateLabel} · ontem: ${fDM(yest)} · hoje: ${fDM(today)}</div>
      </div>
      <button onclick="copyResumo()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:rgba(59,130,246,.18);border:1px solid rgba(96,165,250,.35);color:#93c5fd;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s">
        📋 Copiar resumo
      </button>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}

  requestAnimationFrame(()=>{

}

function setManualSpendHoje(v){
  const n=parseFloat(v.replace(/[R$\s.]/g,"").replace(",","."));
  S.manualSpendHoje=(isNaN(n)||n<=0)?null:n;
  S.currentFunil==="seguidores"?renderResumoSeg():renderResumo();
}
function clearManualSpend(){S.manualSpendHoje=null;S.currentFunil==="seguidores"?renderResumoSeg():renderResumo();}
function copyResumo(){
  const el=document.getElementById("page-resumo");
  const text=el?._resumoText||"";
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>{
    document.querySelectorAll("[onclick='copyResumo()']").forEach(b=>{
      const orig=b.innerHTML;b.innerHTML="✓ Copiado!";b.style.color="#4ade80";
      setTimeout(()=>{b.innerHTML=orig;b.style.color="";},1800);
    });
  }).catch(()=>alert("Não foi possível copiar. Selecione o texto manualmente."));
}

// ── Render Anúncios (Seguidores) ──────────────────────────────────────────
function renderAnunciosSeg(){
  const el=document.getElementById("page-anuncios");if(!el)return;
  const start=S.startDate,end=S.endDate;
  function sumSeg(map,key){let t=0;for(const[d,n]of Object.entries(map[key]||{})){if(d>=start&&d<=end)t+=(n.seguidores||0);}return t;}
  function fDM(iso){if(!iso)return"—";const[,m,d]=iso.split("-");return`${d}/${m}`;}
  const dateLabel=start===end?fDM(start):`${fDM(start)} a ${fDM(end)}`;

  // Campaign rows
  const campRows=[];
  for(const[campName,byDate] of Object.entries(S.distMetaByCampByDate)){
    let cSpend=0,cClicks=0,cImpr=0,cPV=0;
    for(const[d,vals] of Object.entries(byDate)){if(d>=start&&d<=end){cSpend+=vals.spend;cClicks+=vals.clicks;cImpr+=vals.impressions;cPV+=vals.profileVisits||0;}}
    if(cSpend===0)continue;
    const cSeg=sumSeg(S.distSegByCamp,campName);
    campRows.push({campName,spend:cSpend,clicks:cClicks,impressions:cImpr,profileVisits:cPV,seguidores:cSeg,
      ctr:cImpr>0?(cClicks/cImpr)*100:0,cpm:cImpr>0?(cSpend/cImpr)*1000:0,
      custoPorVisita:cPV>0?cSpend/cPV:0,custoPorSeg:cSeg>0?cSpend/cSeg:0});
  }
  const{col:cCol,dir:cDir}=S.cSort;
  const sortedCamps=[...campRows].sort((a,b)=>{const av=a[cCol]??"",bv=b[cCol]??"";if(typeof av==="string")return cDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);return cDir==="asc"?av-bv:bv-av;});
  const _cq=S.campSearch.trim().toLowerCase();
  const filteredCamps=_cq?sortedCamps.filter(c=>c.campName.toLowerCase().includes(_cq)):sortedCamps;

  // Ad rows
  const hasCampSel=S.selectedCamps.size>0;
  const adRows=[];
  for(const[adName,meta] of Object.entries(S.distMetaByAd)){
    if(hasCampSel){const adCamps=meta.camps||new Set();if(![...S.selectedCamps].some(c=>adCamps.has(c)))continue;}
    const byDate=S.distMetaByAdByDate[adName]||{};
    let spend=0,clicks=0,impressions=0,profileVisits=0,igUrl="";
    for(const[d,vals] of Object.entries(byDate)){if(d>=start&&d<=end){spend+=vals.spend;clicks+=vals.clicks;impressions+=vals.impressions;profileVisits+=vals.profileVisits||0;if(!igUrl&&vals.igUrl)igUrl=vals.igUrl;}}
    if(spend===0)continue;
    if(!igUrl)igUrl=meta.igUrl||"";
    const seguidores=sumSeg(S.distSegByAd,adName);
    adRows.push({adName,spend,clicks,impressions,profileVisits,seguidores,igUrl,
      ctr:impressions>0?(clicks/impressions)*100:0,cpm:impressions>0?(spend/impressions)*1000:0,
      custoPorVisita:profileVisits>0?spend/profileVisits:0,custoPorSeg:seguidores>0?spend/seguidores:0});
  }
  const totSpend=campRows.reduce((a,c)=>a+c.spend,0);
  const totSeg=campRows.reduce((a,c)=>a+c.seguidores,0);
  const totPV=campRows.reduce((a,c)=>a+c.profileVisits,0);
  const totClicks=campRows.reduce((a,c)=>a+c.clicks,0);
  const totImpr=campRows.reduce((a,c)=>a+c.impressions,0);
  const totCtr=totImpr>0?(totClicks/totImpr)*100:0;
  const totCustoPorSeg=totSeg>0?totSpend/totSeg:0;

  const _aq=S.adSearch.trim().toLowerCase();
  const filteredAds=_aq?adRows.filter(a=>a.adName.toLowerCase().includes(_aq)):adRows;
  const{col,dir}=S.aSort;
  const sorted=[...filteredAds].sort((a,b)=>{const av=a[col]??0,bv=b[col]??0;if(typeof av==="string")return dir==="asc"?av.localeCompare(bv):bv.localeCompare(av);return dir==="asc"?av-bv:bv-av;});

  const selAds=sorted.filter(a=>S.selectedAds.has(a.adName));
  const hasSelAds=selAds.length>0;
  let adResumoText="";
  if(hasSelAds){
    const lines=["*Melhores ads - TMR Seguidores*","",`_${dateLabel}_`,""];
    for(const a of selAds){
      lines.push("Nome do ad ⤵️");lines.push(a.adName);
      if(a.igUrl)lines.push(a.igUrl);
      lines.push(`Investimento:\t${fBRL(a.spend)}`);
      lines.push(`Visitas ao Perfil:\t${a.profileVisits}`);
      lines.push(`Custo/Visita:\t${a.profileVisits>0?fBRL(a.custoPorVisita):"—"}`);
      lines.push(`Seguidores:\t${a.seguidores}`);
      lines.push(`Custo/Seguidor:\t${a.seguidores>0?fBRL(a.custoPorSeg):"—"}`);
      lines.push("");
      lines.push(`CTR:\t${fPct(a.ctr)}`);
      lines.push(`CPM:\t${fBRL(a.cpm)}`);
      lines.push("");
    }
    adResumoText=lines.join("\n");
  }
  el._adResumoText=adResumoText;

  const _fid=document.activeElement?.id;
  const TH="padding:10px 14px;text-align:right;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);white-space:nowrap";
  const THL="padding:10px 14px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--hint);border-bottom:1px solid var(--border);white-space:nowrap";
  const THCK="width:36px;padding:10px 8px;text-align:center;border-bottom:1px solid var(--border)";
  function thS(col_,lbl,isCamp){
    const aC=isCamp?cCol:col,aD=isCamp?cDir:dir,active=aC===col_;
    const arrow=active?(aD==="asc"?" ↑":" ↓"):" ↕";
    const fn=isCamp?`sortCampanhas('${col_}')`:`sortAnuncios('${col_}')`;
    return `<th onclick="${fn}" style="${TH};color:${active?"var(--text)":"var(--hint)"}">${lbl}<span style="color:${active?"#60a5fa":"var(--hint)"};font-size:9px;margin-left:3px">${arrow}</span></th>`;
  }
  function chkBox(checked){
    return `<div style="width:16px;height:16px;border-radius:4px;border:2px solid ${checked?"#10b981":"rgba(255,255,255,.2)"};background:${checked?"#10b981":"transparent"};display:flex;align-items:center;justify-content:center;margin:auto;transition:all .15s">
      ${checked?`<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L4 7L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:""}
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:6px">
      <div>
        <div class="hdr-title">Campanhas / Anúncios — Seguidores</div>
        <div class="hdr-sub">atualizado em: ${S.updated||"—"} · ${sortedCamps.length} campanhas · ${sorted.length} anúncios${S.selectedAds.size>0?" · "+S.selectedAds.size+" selecionado(s)":""}</div>
      </div>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px">
      ${kpiCard("Investimento",fBRL(totSpend),"","var(--text-strong)")}
      ${kpiCard("Visitas ao Perfil",totPV.toLocaleString("pt-BR"),"","var(--text-strong)")}
      ${kpiCard("Seguidores",totSeg.toLocaleString("pt-BR"),"","var(--text-strong)")}
      ${kpiCard("Custo/Seguidor",totCustoPorSeg>0?fBRL(totCustoPorSeg):"—","","var(--text-strong)")}
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <div class="section-lbl" style="margin-bottom:0">Campanhas</div>
      ${S.selectedCamps.size>0?`<button onclick="clearCamps()" style="font-size:10px;padding:3px 9px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.08);color:#f87171;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif">✕ Limpar (${S.selectedCamps.size})</button>`:""}
      <span style="font-size:10px;color:var(--hint)">Clique para filtrar anúncios</span>
    </div>
    <div style="position:relative;margin-bottom:10px">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:12px;pointer-events:none">🔍</span>
      <input id="camp-search-input" oninput="setCampSearch(this.value)" value="${S.campSearch}" placeholder="Buscar campanha…" style="width:100%;padding:8px 12px 8px 34px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box" onfocus="this.style.borderColor='rgba(96,165,250,.4)'" onblur="this.style.borderColor='var(--border)'"/>
    </div>
    <div style="overflow-x:auto;margin-bottom:22px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--card)">
          <th style="${THCK}"></th>
          <th onclick="sortCampanhas('campName')" style="${THL};cursor:pointer;user-select:none">Campanha ${cCol==="campName"?(cDir==="asc"?"↑":"↓"):"↕"}</th>
          ${thS("spend","Investimento",true)}
          ${thS("profileVisits","Visitas",true)}
          ${thS("custoPorVisita","Custo/Visita",true)}
          ${thS("seguidores","Seguidores",true)}
          ${thS("custoPorSeg","Custo/Seg.",true)}
          ${thS("ctr","CTR",true)}
          ${thS("cpm","CPM",true)}
        </tr></thead>
        <tbody>
          ${filteredCamps.map(c=>{
            const sel=S.selectedCamps.has(c.campName);
            return `<tr onclick="toggleCamp('${c.campName.replace(/\\/g,"\\\\").replace(/'/g,"\\'")}')" style="cursor:pointer;border-top:1px solid var(--border);background:${sel?"rgba(16,185,129,.1)":"transparent"}" onmouseover="if(!this.dataset.sel||this.dataset.sel==='0')this.style.background='rgba(255,255,255,.03)'" onmouseout="if(!this.dataset.sel||this.dataset.sel==='0')this.style.background='transparent'" data-sel="${sel?"1":"0"}">
              <td style="padding:8px;text-align:center;border-top:1px solid var(--border)">${chkBox(sel)}</td>
              <td style="padding:9px 14px;color:${sel?"#10b981":"var(--text)"};font-size:11px;font-weight:${sel?600:400};max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><span title="${c.campName}">${c.campName}</span></td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-strong)">${fBRL(c.spend)}</td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace">${c.profileVisits}</td>
              <td style="padding:9px 14px;text-align:right;color:var(--text-strong)">${c.custoPorVisita>0?fBRL(c.custoPorVisita):"—"}</td>

    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">

      <input id="ad-search-input" oninput="setAdSearch(this.value)" value="${S.adSearch}" placeholder="Buscar anúncio…" style="width:100%;padding:8px 12px 8px 34px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box" onfocus="this.style.borderColor='rgba(96,165,250,.4)'" onblur="this.style.borderColor='var(--border)'"/>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="background:var(--card)">
          <th style="${THCK}"></th>
          <th onclick="sortAnuncios('adName')" style="${THL};cursor:pointer;user-select:none">Anúncio ${col==="adName"?(dir==="asc"?"↑":"↓"):"↕"}</th>
          ${thS("spend","Investimento",false)}
          ${thS("profileVisits","Visitas",false)}
          ${thS("custoPorVisita","Custo/Visita",false)}
          ${thS("seguidores","Seguidores",false)}
          ${thS("custoPorSeg","Custo/Seg.",false)}
          ${thS("ctr","CTR",false)}
          ${thS("cpm","CPM",false)}
          <th style="${THCK}"></th>
        </tr></thead>
        <tbody>
          ${sorted.map(a=>{
            const sel=S.selectedAds.has(a.adName);
            return `<tr onclick="toggleAd('${a.adName.replace(/\\/g,"\\\\").replace(/'/g,"\\'")}')" style="cursor:pointer;border-top:1px solid var(--border);background:${sel?"rgba(16,185,129,.1)":"transparent"}" onmouseover="if(!this.dataset.sel||this.dataset.sel==='0')this.style.background='rgba(255,255,255,.03)'" onmouseout="if(!this.dataset.sel||this.dataset.sel==='0')this.style.background='transparent'" data-sel="${sel?"1":"0"}">
              <td style="padding:8px;text-align:center;border-top:1px solid var(--border)">${chkBox(sel)}</td>
              <td style="padding:9px 14px;color:${sel?"#10b981":"var(--text)"};font-size:11px;font-weight:${sel?600:400};max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.adName}">${a.adName}</td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace;color:var(--text-strong)">${fBRL(a.spend)}</td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace">${a.profileVisits}</td>
              <td style="padding:9px 14px;text-align:right;color:var(--text-strong)">${a.custoPorVisita>0?fBRL(a.custoPorVisita):"—"}</td>
              <td style="padding:9px 14px;text-align:right;font-family:'JetBrains Mono',monospace">${a.seguidores}</td>
              <td style="padding:9px 14px;text-align:right;color:var(--text-strong)">${a.custoPorSeg>0?fBRL(a.custoPorSeg):"—"}</td>
              <td style="padding:9px 14px;text-align:right;color:var(--text-strong)">${fPct(a.ctr)}</td>
              <td style="padding:9px 14px;text-align:right;color:var(--text-strong)">${fBRL(a.cpm)}</td>
              <td style="padding:9px 14px;text-align:center" onclick="event.stopPropagation()">${a.igUrl?`<a href="${a.igUrl}" target="_blank" rel="noopener" style="display:inline-block;padding:3px 8px;border:1px solid rgba(99,179,237,.35);border-radius:5px;color:#63b3ed;text-decoration:none;font-size:10px;font-weight:600" title="Ver anúncio">Ver ↗</a>`:"—"}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
    ${hasSelAds?`
    <div style="margin-top:22px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div class="section-lbl" style="margin-bottom:2px">Resumo de Anúncios</div>
          <div style="font-size:10px;color:var(--hint)">${selAds.length} ad(s): ${dateLabel}</div>
        </div>
        <button id="btn-copy-ads" onclick="copyAdResumo()" style="padding:6px 16px;background:rgba(59,130,246,.15);border:1px solid rgba(96,165,250,.35);color:#93c5fd;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copiar resumo
        </button>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px">
        <pre style="font-family:'JetBrains Mono','DM Mono',monospace;font-size:11px;color:var(--text);white-space:pre-wrap;line-height:1.9;margin:0;user-select:all">${adResumoText.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</pre>
      </div>
    </div>`:""}
  `;
  if(_fid==="camp-search-input"||_fid==="ad-search-input"){
    requestAnimationFrame(()=>{
      const _inp=document.getElementById(_fid);
      if(_inp){_inp.focus();const _l=_inp.value.length;_inp.setSelectionRange(_l,_l);}
    });
  }
}

// ── Render Resumo (Seguidores) ────────────────────────────────────────────
function renderResumoSeg(){
  const el=document.getElementById("page-resumo");if(!el)return;
  const today=todayISO(),yest=yesterdayISO();
  const start=S.startDate||today,end=S.endDate||today;

  function periodMetricsDist(s,e){
    return getTotalsDist(getDailyDist(s,e));
  }
  const tot  =periodMetricsDist(start,end);
  const ontem=periodMetricsDist(yest,yest);
  const hojeBase=periodMetricsDist(today,today);
  const hoje={...hojeBase};
  if(S.manualSpendHoje!==null){
    hoje.spend=S.manualSpendHoje;
    hoje.custoPorSeguidor=hoje.seguidores>0?hoje.spend/hoje.seguidores:0;
    hoje.custoPorVisita=hoje.profileVisits>0?hoje.spend/hoje.profileVisits:0;
  }

  function fDM(iso){if(!iso)return"—";const[,m,d]=iso.split("-");return`${d}/${m}`;}
  const dateLabel=start===end?fDM(start):`${fDM(start)} a ${fDM(end)}`;

  function fBRLR(n){return "R$ "+(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}

  function blockText(label,m,plan){
    const lines=[
      `*${label}*`,``,
      `Investimento:\t${fBRLR(m.spend)}`,
      `Visitas ao Perfil:\t${m.profileVisits}`,
      `Custo/Visita:\t${m.custoPorVisita>0?fBRLR(m.custoPorVisita):"—"}`,
      `Seguidores:\t${m.seguidores}`,
      `Custo/Seguidor:\t${m.custoPorSeguidor>0?fBRLR(m.custoPorSeguidor):"—"}`,
      ``,
      `Hook Rate:\t${fPct(m.hookRate)}`,
      `Hold Rate:\t${fPct(m.holdRate)}`,
    ];
    if(plan!==null&&plan!==undefined)lines.push(`Plan até hj:\t${fBRLR(plan)}`);
    return lines.join("\n");
  }

  const planVal=S.manualPlanDist;
  const resumoText=
`*Resumo TMR - Seguidores*\t\t

_${dateLabel}_\t\t

📶 ${blockText("Total",tot)}

⬅️ ${blockText("Ontem",ontem)}

⬇️ ${blockText("Hoje",hoje,planVal)}`;

  function row(lbl,val){
    return `<div style="display:grid;grid-template-columns:200px 1fr;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
      <span style="color:var(--muted);font-size:12px">${lbl}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-strong)">${val||"—"}</span>
    </div>`;
  }

  function sectionSeg(label,m,isHoje=false){
    const isManual=isHoje&&S.manualSpendHoje!==null;
    const investRow=isHoje?`
      <div style="display:grid;grid-template-columns:200px 1fr auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
        <span style="color:var(--muted);font-size:12px">Investimento</span>
        <input id="manual-spend-input" value="${isManual?(m.spend||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):""}"
          placeholder="${fBRLR(hojeBase.spend)}" oninput="setManualSpendHoje(this.value)" onkeydown="if(event.key==='Enter')this.blur()"
          style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${isManual?"#fbbf24":"var(--text-strong)"};background:transparent;border:none;border-bottom:1px solid ${isManual?"rgba(251,191,36,.4)":"rgba(255,255,255,.1)"};outline:none;padding:2px 0;width:100%"/>
        <span style="min-width:80px;text-align:right">${isManual?`<button onclick="clearManualSpend()" style="font-size:10px;padding:2px 8px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif">↩ Restaurar</button>`:""}</span>
      </div>`:row("Investimento",fBRLR(m.spend));
    const planRow=isHoje?`
      <div style="display:grid;grid-template-columns:200px 1fr auto;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:center">
        <span style="color:var(--muted);font-size:12px">Plan até hj</span>
        <input id="manual-plan-dist-input" value="${S.manualPlanDist!==null?(S.manualPlanDist||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}):""}"
          placeholder="Digitar plan…" oninput="setManualPlanDist(this.value)" onkeydown="if(event.key==='Enter')this.blur()"
          style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${S.manualPlanDist!==null?"#fbbf24":"var(--text-strong)"};background:transparent;border:none;border-bottom:1px solid ${S.manualPlanDist!==null?"rgba(251,191,36,.4)":"rgba(255,255,255,.1)"};outline:none;padding:2px 0;width:100%"/>
        <span style="min-width:80px;text-align:right">${S.manualPlanDist!==null?`<button onclick="clearManualPlanDist()" style="font-size:10px;padding:2px 8px;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:#fbbf24;border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif">↩ Limpar</button>`:""}</span>
      </div>`:"";
    return `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:700;color:var(--text-strong);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">${label}</div>
      ${investRow}
      ${row("Visitas ao Perfil",m.profileVisits.toLocaleString("pt-BR"))}
      ${row("Custo/Visita",m.custoPorVisita>0?fBRLR(m.custoPorVisita):"—")}
      ${row("Seguidores",m.seguidores.toLocaleString("pt-BR"))}
      ${row("Custo/Seguidor",m.custoPorSeguidor>0?fBRLR(m.custoPorSeguidor):"—")}
      <div style="height:10px"></div>
      ${row("Hook Rate",fPct(m.hookRate))}
      ${row("Hold Rate",fPct(m.holdRate))}
      ${planRow}
    </div>`;
  }

  el.innerHTML=`
    <div class="hdr" style="margin-bottom:16px">
      <div>
        <div class="hdr-title">Resumo diário — Seguidores</div>
        <div class="hdr-sub">período: ${dateLabel} · ontem: ${fDM(yest)} · hoje: ${fDM(today)}</div>
      </div>
      <button onclick="copyResumo()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:rgba(59,130,246,.18);border:1px solid rgba(96,165,250,.35);color:#93c5fd;border-radius:9px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s">
        📋 Copiar resumo
      </button>
    </div>
    ${S.error?`<div class="err">⚠️ ${S.error}</div>`:""}
    <div style="display:grid;grid-template-columns:1fr 420px;gap:20px;align-items:start">
      <div>
        ${sectionSeg("📶 Total",tot)}
        ${sectionSeg("⬅️ Ontem",ontem)}
        ${sectionSeg("⬇️ Hoje",hoje,true)}
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;position:sticky;top:70px">
        <pre id="resumo-preview" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text);white-space:pre-wrap;line-height:1.8;margin:0;user-select:all">${resumoText.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</pre>
      </div>
    </div>`;
  el._resumoText=resumoText;
  requestAnimationFrame(()=>{
    const fid=document.activeElement?.id;
    if(fid==="manual-spend-input"||fid==="manual-plan-dist-input"){
      const _s=document.getElementById(fid);
      if(_s){const _l=_s.value.length;_s.setSelectionRange(_l,_l);}
    }
  });
}
function setManualPlanDist(v){
  const n=parseFloat(v.replace(/[R$\s.]/g,"").replace(",","."));
  S.manualPlanDist=(isNaN(n)||n<=0)?null:n;
  renderResumoSeg();
}
function clearManualPlanDist(){S.manualPlanDist=null;renderResumoSeg();}

function render(){
  renderHeader();
  const ld=document.getElementById("loading");
  if(S.firstLoad&&S.loading){if(ld)ld.style.display="flex";return;}
  if(ld)ld.style.display="none";
  const errEl=document.getElementById("err-panel");
  if(errEl){
    if(S.error){
      errEl.style.display="flex";
      errEl.innerHTML=`<div style="background:#1e1014;border:1px solid #f87171;border-radius:12px;padding:24px 28px;max-width:700px;width:100%">
        <div style="color:#f87171;font-weight:700;font-size:15px;margin-bottom:12px">⚠️ Erro ao carregar dados</div>
        <code style="display:block;color:#fca5a5;font-size:12px;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6">${S.error}</code>
        <button onclick="loadData(true)" style="margin-top:16px;padding:8px 18px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px">↻ Tentar novamente</button>
      </div>`;
      return;
    } else { errEl.style.display="none"; }
  }
  const isSeg=S.currentFunil==="seguidores";
  if(S.currentPage==="principal")    isSeg?renderPrincipalSeg():renderPrincipal();
  else if(S.currentPage==="funil")   renderFunil();
  else if(S.currentPage==="trafego") isSeg?renderTrafegoSeg():renderTrafego();
  else if(S.currentPage==="anuncios")isSeg?renderAnunciosSeg():renderAnuncios();
  else if(S.currentPage==="resumo")  isSeg?renderResumoSeg():renderResumo();
}

// ── Init ─────────────────────────────────────────────────────────────────
S.startDate=nDaysAgoISO(29);S.endDate=todayISO();S.activeQuick="30d";
render();
loadData();

</script>
</body>
</html>
